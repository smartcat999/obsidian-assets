<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="560" viewBox="0 0 1280 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/></marker>
    <style>
      .t{font:16px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; fill:#111827}
      .h{font:22px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; font-weight:700; fill:#0f172a}
      .b{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .r{fill:#fef2f2;stroke:#b91c1c;stroke-width:2;rx:10}
      .y{fill:#fffbeb;stroke:#b45309;stroke-width:2;rx:10}
    </style>
  </defs>
  <text x="30" y="40" class="h">镜像加固风险分类与边界</text>

  <rect x="40" y="80" width="260" height="70" class="b"/>
  <text x="120" y="123" class="t">Image Hardening</text>

  <rect x="360" y="70" width="390" height="200" class="r"/>
  <text x="500" y="105" class="h">镜像内风险</text>
  <text x="390" y="145" class="t">- 基础镜像/依赖 CVE</text>
  <text x="390" y="175" class="t">- 调试工具与多余二进制残留</text>
  <text x="390" y="205" class="t">- 明文密钥、证书、token</text>
  <text x="390" y="235" class="t">- 文件权限过宽</text>

  <rect x="800" y="70" width="430" height="200" class="y"/>
  <text x="945" y="105" class="h">运行时风险</text>
  <text x="830" y="145" class="t">- privileged / root 运行</text>
  <text x="830" y="175" class="t">- hostNetwork / hostPID / hostIPC</text>
  <text x="830" y="205" class="t">- securityContext 约束不足</text>
  <text x="830" y="235" class="t">- 能力集与系统调用限制过宽</text>

  <line x1="300" y1="115" x2="360" y2="115" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="130" x2="800" y2="130" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="40" y="330" width="1190" height="170" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2" rx="10"/>
  <text x="60" y="370" class="h">防护策略</text>
  <text x="60" y="405" class="t">构建前：基线约束（基础镜像、Dockerfile 规则、凭据管理）</text>
  <text x="60" y="435" class="t">构建后：镜像扫描（漏洞、敏感信息、配置、SBOM）</text>
  <text x="60" y="465" class="t">发布前：运行时门禁（最小权限、命名空间、安全上下文）</text>
</svg>
