<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#1f2937"/></marker>
    <style>
      .t{font:16px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; fill:#111827}
      .h{font:22px -apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif; font-weight:700; fill:#0f172a}
      .b{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:10}
      .w{fill:#fff7ed;stroke:#c2410c;stroke-width:2;rx:10}
    </style>
  </defs>
  <text x="30" y="40" class="h">Layer 变更与 Whiteout 语义（删除不等于彻底移除）</text>

  <rect x="40" y="90" width="360" height="210" class="b"/>
  <text x="60" y="125" class="t">Lower Layer (历史层)</text>
  <text x="60" y="160" class="t">/etc/app.conf</text>
  <text x="60" y="190" class="t">/usr/bin/gdb</text>
  <text x="60" y="220" class="t">/usr/bin/tcpdump</text>
  <text x="60" y="250" class="t">/secrets/private.key</text>

  <rect x="470" y="90" width="360" height="230" class="w"/>
  <text x="490" y="125" class="t">Upper Layer (变更层)</text>
  <text x="490" y="160" class="t">新增：/app/server</text>
  <text x="490" y="190" class="t">删除文件标记：.wh.gdb</text>
  <text x="490" y="220" class="t">删除目录子项：.wh..wh..opq</text>
  <text x="490" y="250" class="t">修改：/etc/app.conf</text>

  <rect x="900" y="90" width="330" height="230" class="b"/>
  <text x="920" y="125" class="t">Merged View (运行视图)</text>
  <text x="920" y="160" class="t">可见：/app/server</text>
  <text x="920" y="190" class="t">不可见：/usr/bin/gdb</text>
  <text x="920" y="220" class="t">不可见：/secrets/private.key</text>

  <line x1="400" y1="190" x2="470" y2="190" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="830" y1="190" x2="900" y2="190" stroke="#1f2937" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="40" y="380" width="1190" height="200" fill="#fef2f2" stroke="#b91c1c" stroke-width="2" rx="10"/>
  <text x="60" y="420" class="h">安全结论</text>
  <text x="60" y="460" class="t">1) whiteout 只影响“合并后的运行视图”，不会回写清除历史层数据。</text>
  <text x="60" y="495" class="t">2) 仅通过容器内 ls/find 判定“已清理”并不可靠，仍需做层历史与导出包验证。</text>
  <text x="60" y="530" class="t">3) 真正降低残留风险通常需要重构 Dockerfile 与镜像层结构，而非单次 rm。</text>
</svg>
